name: Publish Docker Image

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Get the code from your repository
      - name: Check out the repository
        uses: actions/checkout@v4

      # 2. Log in securely to Docker Hub using GitHub Secrets
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. Set up Docker Buildx (allows for advanced caching and builds)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Build the image from the folder and push it
      - name: Build and push the Python Worker image
        uses: docker/build-push-action@v5
        with:
          context: ./db_subscriber
          push: true
          # This tags the image as: your_username/weather-worker:latest
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/weather-sub:latest
