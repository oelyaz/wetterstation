services:
    postgres:
        image: postgres:15-alpine
        container_name: weather_db
        env_file: .env
        ports:
          - "5432:5432"
        volumes:
          - ./pgdata:/var/lib/postgresql/data
        restart: unless-stopped

    python-worker:
        build: .
        container_name: weather_subscriber
        depends_on:
          - postgres
        env_file: .env
        restart: unless-stopped